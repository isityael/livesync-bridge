# LiveSync Bridge — Deno-based CouchDB sync bridge for Basic Memory
# Pushes to: harbor.m0sh1.cc/apps/livesync-bridge
#
# This pipeline runs in the standalone livesync-bridge repo (sm-moshi/livesync-bridge).
# The infra-cli parent repo has a mirror pipeline triggered by submodule pointer updates.
#
# Artifacts per image (all stored as OCI 1.1 referrers, not top-level tags):
#   - Cosign signature    (subject.accessory)
#   - Notation signature  (signature.notation)
#   - SBOM attestation    (cosign attest, SPDX-JSON via syft)
#   - Build provenance    (SLSA, via BuildKit --provenance=mode=max)
when:
  - event: manual
  - event: push
    branch: main

variables:
  - &image "harbor.m0sh1.cc/apps/livesync-bridge"
  - &image_tag "${CI_COMMIT_SHA:0:8}"
  - &deno_image "dhi.io/deno:2.8.2-dev@sha256:2bf4b09bd20ada9f10b9326eb4379b1e5eab05756f1c47652609c5bb81120487"

steps:
  - name: deno-lint
    image: *deno_image
    commands:
      - deno lint

  - name: deno-fmt
    image: *deno_image
    commands:
      - deno fmt --check

  - name: deno-check
    image: *deno_image
    failure: ignore
    commands:
      - deno install --allow-import
      # Advisory — upstream lib/ has ArrayBuffer compat errors with Deno 2.x.
      - deno check --allow-import main.ts

  - name: build-and-push
    image: woodpeckerci/plugin-docker-buildx@sha256:bfdb60c639233180bfaafdc2e0d4ca289669b3cccacdbdf5226be1058449acff
    privileged: true
    settings:
      registry: harbor.m0sh1.cc
      repo: *image
      dockerfile: Dockerfile
      tags:
        - *image_tag
        - latest
      logins:
        - registry: harbor.m0sh1.cc
          username:
            from_secret: harbor_username
          password:
            from_secret: harbor_password
        - registry: dhi.io
          username:
            from_secret: dhi_username
          password:
            from_secret: dhi_password
      provenance: mode=max
      buildkit_driveropt: network=host
      build_args:
        - "COMMIT_SHA=${CI_COMMIT_SHA}"
      cache_from: 'type=registry\,ref=harbor.m0sh1.cc/cache/livesync-bridge:buildcache'
      cache_to: 'type=registry,ref=harbor.m0sh1.cc/cache/livesync-bridge:buildcache,mode=max,ignore-error=true'

  - name: wait-for-replication
    image: *deno_image
    commands:
      - echo "Waiting 10s for Garage replication..."
      - sleep 10

  - name: trivy-scan
    failure: ignore
    image: dhi.io/trivy:0.71.0-alpine3.23-dev@sha256:081c285d76442d196ac8bd9bd415f838b0e7186944702884d236ad2322f23aab
    environment:
      IMAGE_REF: harbor.m0sh1.cc/apps/livesync-bridge:${CI_COMMIT_SHA:0:8}
      TRIVY_USERNAME:
        from_secret: harbor_username
      TRIVY_PASSWORD:
        from_secret: harbor_password
    commands:
      - trivy image --exit-code 1 --severity CRITICAL --ignore-unfixed $${IMAGE_REF}
      - trivy image --exit-code 0 --severity HIGH --ignore-unfixed $${IMAGE_REF}

  - name: sbom-generate
    failure: ignore
    image: dhi.io/syft:1.45.1-alpine3.23-dev@sha256:d680c1e089f70890cd06e48cc4422f3b122b9ebc57911333a5b8e795f1dd9683
    environment:
      IMAGE_REF: harbor.m0sh1.cc/apps/livesync-bridge:${CI_COMMIT_SHA:0:8}
      SYFT_REGISTRY_AUTH_AUTHORITY: harbor.m0sh1.cc
      SYFT_REGISTRY_AUTH_USERNAME:
        from_secret: harbor_username
      SYFT_REGISTRY_AUTH_PASSWORD:
        from_secret: harbor_password
    commands:
      - syft registry:$${IMAGE_REF} -o spdx-json > sbom.spdx.json

  - name: cosign-sign
    image: dhi.io/cosign:3.0.6-alpine3.23-dev@sha256:1f114e202db2f37e8ef2a9b0dfc845a46a06dce5a1594d73271a80a298f6c647
    environment:
      IMAGE_REF: harbor.m0sh1.cc/apps/livesync-bridge:${CI_COMMIT_SHA:0:8}
      COSIGN_EXPERIMENTAL: "1"
      COSIGN_KEY:
        from_secret: cosign_key
      COSIGN_PASSWORD:
        from_secret: cosign_password
      REGISTRY_USERNAME:
        from_secret: harbor_username
      REGISTRY_PASSWORD:
        from_secret: harbor_password
    commands:
      - echo "$COSIGN_KEY" > /tmp/cosign.key
      - cosign login harbor.m0sh1.cc -u "$REGISTRY_USERNAME" -p "$REGISTRY_PASSWORD"
      - cosign sign --key /tmp/cosign.key --yes --registry-referrers-mode=oci-1-1 --use-signing-config=false --tlog-upload=false $${IMAGE_REF}
      # Attest SBOM generated by syft in the previous step.
      - cosign attest --key /tmp/cosign.key --type spdxjson --predicate sbom.spdx.json --yes --use-signing-config=false --tlog-upload=false $${IMAGE_REF}
      - rm -f /tmp/cosign.key sbom.spdx.json

  - name: notation-sign
    image: dhi.io/notation:1.3.2-alpine3.23-dev@sha256:0f4fcc63857713e7237f19e1cc68d1cb58f6ec8cebfd26a8cc0f0eea674d2be5
    environment:
      IMAGE_REF: harbor.m0sh1.cc/apps/livesync-bridge:${CI_COMMIT_SHA:0:8}
      NOTATION_KEY:
        from_secret: notation_key
      NOTATION_CERT:
        from_secret: notation_cert
      REGISTRY_USERNAME:
        from_secret: harbor_username
      REGISTRY_PASSWORD:
        from_secret: harbor_password
    commands:
      - mkdir -p /tmp/notation $HOME/.config/notation $HOME/.docker
      - echo "$NOTATION_KEY" > /tmp/notation/harbor.key
      - echo "$NOTATION_CERT" > /tmp/notation/harbor.crt
      - |
        cat > $HOME/.config/notation/signingkeys.json <<EOF
        {"default":"harbor","keys":[{"name":"harbor","keyPath":"/tmp/notation/harbor.key","certPath":"/tmp/notation/harbor.crt"}]}
        EOF
      - printf '{"auths":{"harbor.m0sh1.cc":{"auth":"%s"}}}' "$(printf '%s:%s' "$REGISTRY_USERNAME" "$REGISTRY_PASSWORD" | base64 -w0)" > $HOME/.docker/config.json
      - notation sign --force-referrers-tag=false --key harbor $${IMAGE_REF}
      - rm -rf /tmp/notation $HOME/.docker/config.json
