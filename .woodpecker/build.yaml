# LiveSync Bridge validation pipeline for isityael/livesync-bridge.
# GHCR publication, SBOM generation, vulnerability gating, and signing are
# canonicalized in .github/workflows/publish-ghcr.yaml.
when:
  - event: manual
  - event: push
    branch: main
  - event: pull_request

variables:
  - &node_image "dhi.io/node:26.5.0-alpine3.24-dev@sha256:82e1032dbce3eac8b0c4844ca2b17788b6b8633be4502e2f6d89cc9643fa6cd9"
  - &pnpm_install "corepack enable && pnpm install --frozen-lockfile --ignore-scripts"

steps:
  - name: pnpm-install
    image: *node_image
    commands:
      - *pnpm_install

  - name: fmt-check
    image: *node_image
    commands:
      - *pnpm_install
      - pnpm run fmt:check

  - name: lint
    image: *node_image
    commands:
      - *pnpm_install
      - pnpm run lint

  - name: typecheck
    image: *node_image
    commands:
      - *pnpm_install
      - pnpm run typecheck

  - name: test
    image: *node_image
    commands:
      - *pnpm_install
      - pnpm test

  - name: dependency-audit
    image: *node_image
    commands:
      - *pnpm_install
      - pnpm audit --audit-level=high

  - name: build
    image: *node_image
    commands:
      - *pnpm_install
      - pnpm run build
